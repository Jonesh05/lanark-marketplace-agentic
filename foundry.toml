[profile.default]
src = "contracts"
out = "out"
libs = ["lib-foundry"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "paris"
remappings = [
  "@openzeppelin/contracts/=lib-foundry/openzeppelin-contracts/contracts/",
  "forge-std/=lib-foundry/forge-std/src/",
]
# Keep Foundry's deps separate from the Next.js `lib/` source tree.
fs_permissions = [{ access = "read", path = "./" }]

[rpc_endpoints]
celo_sepolia = "${CELO_RPC_URL}"
celo = "https://forno.celo.org"

[etherscan]
celo_sepolia = { key = "${CELOSCAN_API_KEY}", url = "https://api-celo-sepolia.blockscout.com/api", chain = 11142220 }
